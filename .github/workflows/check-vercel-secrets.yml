name: Check Vercel secrets

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/check-vercel-secrets.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Record availability only
        shell: bash
        run: |
          mkdir -p .deployment-status
          token=false; org=false; project=false
          [ -n "$VERCEL_TOKEN" ] && token=true
          [ -n "$VERCEL_ORG_ID" ] && org=true
          [ -n "$VERCEL_PROJECT_ID" ] && project=true
          printf '{\n  "VERCEL_TOKEN": %s,\n  "VERCEL_ORG_ID": %s,\n  "VERCEL_PROJECT_ID": %s\n}\n' "$token" "$org" "$project" > .deployment-status/vercel-secrets-available.json
      - name: Save result
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .deployment-status/vercel-secrets-available.json
          git diff --cached --quiet || git commit -m 'Check Vercel secret availability'
          git push origin main
