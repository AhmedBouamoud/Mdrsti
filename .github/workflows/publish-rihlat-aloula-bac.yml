name: Publish Rihlat Aloula Bac on hanane.today

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-rihlat-aloula-bac.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hanane.today repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download approved project package
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/approved-first-bac
          git clone --depth 1 --branch rihlat-aloula-bac-preview \
            https://github.com/AhmedBouamoud/ahmed-projet.git \
            /tmp/approved-first-bac
          cat /tmp/approved-first-bac/.rihlat-deploy/chunk*.b64 \
            | tr -d '\n\r' \
            | base64 --decode \
            > /tmp/rihlat-aloula-approved.zip

      - name: Install approved production version
        shell: bash
        run: |
          set -euo pipefail
          rm -rf rihlat-aloula-bac
          mkdir -p rihlat-aloula-bac
          unzip -q /tmp/rihlat-aloula-approved.zip -d rihlat-aloula-bac
          python3 - <<'PY'
          from pathlib import Path
          base = '<base href="/rihlat-aloula-bac/">'
          for name in ('index.html', 'lesson.html', 'about.html'):
              path = Path('rihlat-aloula-bac') / name
              text = path.read_text(encoding='utf-8')
              if base not in text:
                  text = text.replace('<head>', '<head>' + base, 1)
                  path.write_text(text, encoding='utf-8')
          PY
          test -s rihlat-aloula-bac/index.html
          test -s rihlat-aloula-bac/lesson.html
          test -s rihlat-aloula-bac/about.html

      - name: Commit production files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A rihlat-aloula-bac
          if git diff --cached --quiet; then
            echo 'Production files are already current.'
          else
            git commit -m 'Publish رحلة الأولى باك on hanane.today'
            git push origin main
          fi
