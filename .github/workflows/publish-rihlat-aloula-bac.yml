name: Validate Rihlat Aloula Bac

on:
  push:
    branches: [main]
    paths:
      - 'rihlat-aloula-bac/**'
      - '.github/workflows/publish-rihlat-aloula-bac.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate production files
        shell: bash
        run: |
          set -euo pipefail
          test -s rihlat-aloula-bac/index.html
          test -s rihlat-aloula-bac/lesson.html
          test -s rihlat-aloula-bac/about.html
          grep -q 'رحلة الأولى باك' rihlat-aloula-bac/index.html
          grep -q 'lesson-card' rihlat-aloula-bac/index.html
          echo 'Rihlat Aloula Bac production files are valid.'

      - name: Confirm deployment source
        shell: bash
        run: |
          echo 'Deployment source: repository folder rihlat-aloula-bac/'
          echo 'The workflow no longer downloads or reinstalls an old package.'
