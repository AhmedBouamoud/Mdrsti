name: Find hanane.today homepage across repositories

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/find-live-homepage-across-repos.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  find:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Search all public repositories for the live homepage bytes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .deployment-status
          out=.deployment-status/hanane-live-repo-search.txt
          curl -sSL --connect-timeout 10 --max-time 90 https://hanane.today/ -o /tmp/hanane-live.html
          live_sha=$(sha256sum /tmp/hanane-live.html | awk '{print $1}')
          live_size=$(wc -c < /tmp/hanane-live.html | tr -d ' ')
          printf 'LIVE | size=%s | sha256=%s\n' "$live_size" "$live_sha" > "$out"

          python3 - <<'PY'
          import json, os, urllib.request, hashlib

          token = os.environ['GH_TOKEN']
          out_path = '.deployment-status/hanane-live-repo-search.txt'
          target_data = open('/tmp/hanane-live.html','rb').read()
          target_size = len(target_data)
          target_sha = hashlib.sha256(target_data).hexdigest()

          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'hanane-source-finder'
          }

          def get_json(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=45) as r:
                  return json.load(r)

          repos=[]
          page=1
          while True:
              batch=get_json(f'https://api.github.com/users/AhmedBouamoud/repos?per_page=100&page={page}&sort=updated')
              if not batch:
                  break
              repos.extend(batch)
              if len(batch)<100:
                  break
              page+=1

          matches=[]
          candidates=[]
          errors=[]
          for repo in repos:
              if repo.get('fork'):
                  continue
              full=repo['full_name']
              branch=repo.get('default_branch') or 'main'
              try:
                  tree=get_json(f'https://api.github.com/repos/{full}/git/trees/{branch}?recursive=1')
              except Exception as e:
                  errors.append(f'{full}: tree error {e}')
                  continue
              for item in tree.get('tree',[]):
                  if item.get('type')!='blob' or item.get('size')!=target_size:
                      continue
                  path=item.get('path','')
                  candidates.append(f'{full}@{branch}:{path}')
                  raw=f'https://raw.githubusercontent.com/{full}/{branch}/{path}'
                  try:
                      req=urllib.request.Request(raw,headers={'User-Agent':'hanane-source-finder'})
                      data=urllib.request.urlopen(req,timeout=60).read()
                      if hashlib.sha256(data).hexdigest()==target_sha:
                          matches.append(f'{full}@{branch}:{path}')
                  except Exception as e:
                      errors.append(f'{full}:{path}: download error {e}')

          with open(out_path,'a',encoding='utf-8') as f:
              f.write(f'REPOSITORIES_SCANNED={len(repos)}\n')
              f.write(f'SAME_SIZE_CANDIDATES={len(candidates)}\n')
              for c in candidates:
                  f.write('CANDIDATE | '+c+'\n')
              f.write(f'EXACT_MATCHES={len(matches)}\n')
              for m in matches:
                  f.write('MATCH | '+m+'\n')
              if errors:
                  f.write(f'ERRORS={len(errors)}\n')
                  for e in errors[:30]:
                      f.write('ERROR | '+e+'\n')
          PY
          date -u +'%Y-%m-%dT%H:%M:%SZ' >> "$out"

      - name: Save repository search result
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .deployment-status/hanane-live-repo-search.txt
          git diff --cached --quiet || git commit -m 'Find hanane.today live source across repositories'
          git push origin main
