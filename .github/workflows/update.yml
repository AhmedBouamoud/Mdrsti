name: 📚 تحديث الموقع من Google Sheets

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: تحميل الكود
        uses: actions/checkout@v4

      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: جلب البيانات من Google Sheets
        run: python scripts/fetch_sheets.py

      - name: بناء index.html
        run: python scripts/build.py

      - name: نشر التغييرات
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.json
          git diff --staged --quiet || git commit -m "تحديث تلقائي من Google Sheets - $(date '+%Y-%m-%d %H:%M UTC')"
          git push
