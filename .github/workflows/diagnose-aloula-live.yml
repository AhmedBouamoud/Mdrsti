name: Diagnose Aloula live source

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-aloula-live.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inspect DNS, Netlify site lookup, headers, and content
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .deployment-status
          target='https://aloula.hanane.today/'
          candidate='https://profhanane.netlify.app/rihlat-aloula-bac/'
          {
            echo 'checked_at='$(date -u +%FT%TZ)
            echo '--- DNS CNAME ---'
            dig +short CNAME aloula.hanane.today || true
            echo '--- DNS A ---'
            dig +short A aloula.hanane.today || true
            echo '--- NETLIFY PUBLIC SITE LOOKUP ---'
            curl -sS --max-time 30 -w '\nhttp_status=%{http_code}\n' \
              'https://api.netlify.com/api/v1/sites/aloula.hanane.today' || true
            echo '--- NETLIFY PUBLIC DEPLOYS LOOKUP ---'
            curl -sS --max-time 30 -w '\nhttp_status=%{http_code}\n' \
              'https://api.netlify.com/api/v1/sites/aloula.hanane.today/deploys?per_page=3' || true
            echo '--- TARGET HEADERS ---'
            curl -sSIL --max-time 30 "$target" || true
            echo '--- CANDIDATE HEADERS ---'
            curl -sSIL --max-time 30 "$candidate" || true
            echo '--- CONTENT HASHES ---'
            printf 'target='; curl -sSL --max-time 30 "$target" | sha256sum | cut -d' ' -f1
            printf 'candidate='; curl -sSL --max-time 30 "$candidate" | sha256sum | cut -d' ' -f1
            echo '--- VERSION MARKERS ---'
            printf 'target='; curl -sSL --max-time 30 "$target" | grep -Eo 'نسخة (المعاينة الأولى 0\.1|المحتوى 2\.0)' | head -1 || true
            printf 'candidate='; curl -sSL --max-time 30 "$candidate" | grep -Eo 'نسخة (المعاينة الأولى 0\.1|المحتوى 2\.0)' | head -1 || true
          } > .deployment-status/aloula-live-diagnosis.txt

      - name: Save diagnosis
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '4189824+github-actions[bot]@users.noreply.github.com'
          git add .deployment-status/aloula-live-diagnosis.txt
          git diff --cached --quiet || git commit -m 'Identify Aloula Netlify production site'
          git push origin main

