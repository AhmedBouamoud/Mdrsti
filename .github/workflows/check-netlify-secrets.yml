name: Check Netlify deployment secrets

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/check-netlify-secrets.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
      NETLIFY_HANANE_SITE_ID: ${{ secrets.NETLIFY_HANANE_SITE_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Record secret availability only
        shell: bash
        run: |
          mkdir -p .deployment-status
          auth=false; site=false; token=false; hanane=false
          [ -n "$NETLIFY_AUTH_TOKEN" ] && auth=true
          [ -n "$NETLIFY_SITE_ID" ] && site=true
          [ -n "$NETLIFY_TOKEN" ] && token=true
          [ -n "$NETLIFY_HANANE_SITE_ID" ] && hanane=true
          printf '{\n  "NETLIFY_AUTH_TOKEN": %s,\n  "NETLIFY_SITE_ID": %s,\n  "NETLIFY_TOKEN": %s,\n  "NETLIFY_HANANE_SITE_ID": %s\n}\n' "$auth" "$site" "$token" "$hanane" > .deployment-status/netlify-secrets-available.json
      - name: Save result
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .deployment-status/netlify-secrets-available.json
          git diff --cached --quiet || git commit -m 'Check Netlify deployment secret availability'
          git push origin main
