<style>
:root{--orange:#F4711A;--orange-dark:#D05A0E;--blue:#1A3A6B;--blue-mid:#1E4D8C;--blue-light:#2556A8;--gold:#F5A623;--green:#2A7D4F;--purple:#7B2D8B;--gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-400:#9CA3AF;--gray-600:#4B5563;--gray-800:#1F2937;--sh:0 2px 12px rgba(26,58,107,.10);--shl:0 8px 40px rgba(26,58,107,.18);--r:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh}
header{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-mid) 70%,var(--blue-light) 100%);position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(26,58,107,.35)}
.h-top{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.12)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--orange),var(--gold));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px rgba(244,113,26,.4);flex-shrink:0}
.logo-text h1{color:#fff;font-size:1.2rem;font-weight:900;line-height:1.1}
.logo-text p{color:rgba(255,255,255,.7);font-size:.68rem}
.h-tabs{display:flex;padding:0 20px;gap:2px;overflow-x:auto;scrollbar-width:none}
.h-tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 16px;background:none;border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,.6);font-family:'Cairo',sans-serif;font-size:.84rem;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.tab.on{color:#fff;border-bottom-color:var(--orange)}
.tab:hover:not(.on){color:rgba(255,255,255,.9)}
.filters{display:flex;gap:8px;padding:14px 18px;background:#fff;border-bottom:1px solid var(--gray-200);overflow-x:auto;scrollbar-width:none;position:sticky;top:95px;z-index:100}
.filters::-webkit-scrollbar{display:none}
.chip{padding:6px 15px;border-radius:20px;border:2px solid var(--gray-200);background:#fff;font-family:'Cairo',sans-serif;font-size:.8rem;font-weight:600;color:var(--gray-600);cursor:pointer;transition:.2s;white-space:nowrap}
.chip.on{background:var(--orange);border-color:var(--orange);color:#fff;box-shadow:0 3px 10px rgba(244,113,26,.3)}
.wrap{max-width:960px;margin:0 auto;padding:22px 14px 70px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat{background:#fff;border-radius:12px;padding:14px 10px;text-align:center;border:1px solid var(--gray-200);box-shadow:var(--sh)}
.stat-n{font-size:1.7rem;font-weight:900;color:var(--orange);line-height:1}
.stat-l{font-size:.72rem;color:var(--gray-400);margin-top:3px}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:11px;border-bottom:2px solid var(--gray-200)}
.sec-head h3{font-size:1rem;font-weight:700;color:var(--blue)}
.badge{background:var(--orange);color:#fff;font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:9px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px}
.card{background:#fff;border-radius:var(--r);border:1px solid var(--gray-200);box-shadow:var(--sh);cursor:pointer;transition:transform .22s,box-shadow .22s;animation:up .35s ease both;overflow:hidden}
.card:hover{transform:translateY(-4px);box-shadow:var(--shl)}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.card-top{height:76px;display:flex;align-items:center;justify-content:center;font-size:1.9rem;position:relative}
.card-top.h{background:linear-gradient(135deg,var(--blue),var(--blue-light))}
.card-top.g{background:linear-gradient(135deg,var(--green),#3DAA6C)}
.card-top.c{background:linear-gradient(135deg,var(--purple),#A94EC0)}
.card-top.e{background:linear-gradient(135deg,var(--orange-dark),var(--orange))}
.lvl-badge{position:absolute;top:7px;left:8px;background:rgba(255,255,255,.22);color:#fff;font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:7px}
.card-body{padding:13px 15px}
.card-title{font-size:.93rem;font-weight:700;line-height:1.4;color:var(--gray-800)}
.card-desc{font-size:.77rem;color:var(--gray-400);margin-top:5px;line-height:1.5}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.subj-tag{font-size:.7rem;font-weight:600;padding:3px 9px;border-radius:7px}
.subj-tag.h{background:#EBF0FF;color:var(--blue)}
.subj-tag.g{background:#E8F7EE;color:var(--green)}
.subj-tag.c{background:#F3E8F9;color:var(--purple)}
.subj-tag.e{background:#FFF0E8;color:var(--orange-dark)}
.type-tag{font-size:.7rem;color:var(--gray-400)}
.card-link{display:block;margin-top:11px;padding:7px;background:var(--gray-100);border-radius:8px;text-align:center;color:var(--blue);font-size:.78rem;font-weight:600;text-decoration:none;transition:.18s}
.card-link:hover{background:var(--orange);color:#fff}
.empty{text-align:center;padding:60px 20px;color:var(--gray-400)}
.empty-ico{font-size:2.8rem;margin-bottom:10px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:500;align-items:center;justify-content:center;padding:16px}
.overlay.on{display:flex}
.modal{background:#fff;border-radius:18px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.22);animation:min .28s ease}
@keyframes min{from{opacity:0;transform:scale(.94) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-head{padding:18px 22px 14px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:1.05rem;font-weight:700;color:var(--blue);line-height:1.3}
.modal-x{width:30px;height:30px;border-radius:50%;border:none;background:var(--gray-200);cursor:pointer;font-size:.95rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.18s;margin-right:10px}
.modal-x:hover{background:var(--orange);color:#fff}
.modal-body{padding:18px 22px 22px}
.mrow{display:flex;gap:8px;margin-bottom:10px;font-size:.88rem}
.mrow strong{color:var(--blue);min-width:75px;flex-shrink:0}
.mdesc{background:var(--gray-100);border-radius:10px;padding:13px;font-size:.85rem;line-height:1.8;color:var(--gray-600);margin:12px 0}
.mbtn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;background:var(--orange);color:#fff;border-radius:10px;font-family:'Cairo',sans-serif;font-size:.85rem;font-weight:700;text-decoration:none;transition:.18s}
.mbtn:hover{background:var(--orange-dark)}
@media(max-width:580px){.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.h-top{padding:10px 13px}.wrap{padding:16px 11px 60px}}
</style>

const SUBJ={h:'تاريخ',g:'جغرافيا',c:'التربية على المواطنة',e:'اختبارات'};
const LVL={'3AC':'3 إعدادي','TC':'جذع مشترك','BAC1':'أولى باك','BAC2':'ثانية باك'};
const ICO={h:'⚔️',g:'🌍',c:'🏛️',e:'📝'};
let curTab='all',curLvl='all';
function filtered(){return DB.filter(r=>(curTab==='all'||r.n===curTab)&&(curLvl==='all'||r.l===curLvl))}
function stats(){
  document.getElementById('sL').textContent=DB.filter(r=>r.n==='درس').length;
  document.getElementById('sE').textContent=DB.filter(r=>r.n==='تمرين').length;
  document.getElementById('sX').textContent=DB.filter(r=>r.n==='اختبار').length;
  document.getElementById('sP').textContent=DB.filter(r=>r.u&&r.u.length>4).length;
}
function render(){
  const list=filtered(),out=document.getElementById('out');
  if(!list.length){out.innerHTML='<div class="empty"><div class="empty-ico">📭</div><p>لا توجد عناصر في هذا التصنيف</p></div>';return}
  const label=curTab==='all'?'جميع المحتويات':curTab==='درس'?'الدروس':curTab==='تمرين'?'التمارين':'الاختبارات';
  out.innerHTML=`<div class="sec-head"><h3>${label}</h3><span class="badge">${list.length}</span></div><div class="grid">${list.map((r,i)=>`<div class="card" style="animation-delay:${i*.04}s" onclick="openM(${DB.indexOf(r)})"><div class="card-top ${r.m}">${ICO[r.m]||'📚'}<span class="lvl-badge">${LVL[r.l]||r.l}</span></div><div class="card-body"><div class="card-title">${r.t}</div>${r.d?`<div class="card-desc">${r.d.slice(0,72)}${r.d.length>72?'...':''}</div>`:''}<div class="card-foot"><span class="subj-tag ${r.m}">${SUBJ[r.m]||'عام'}</span><span class="type-tag">${r.n}</span></div>${r.u?`<a class="card-link" href="${r.u}" target="_blank" onclick="event.stopPropagation()">📎 فتح الملف</a>`:''}</div></div>`).join('')}</div>`;
}
function openM(i){
  const r=DB[i];
  document.getElementById('mt').textContent=r.t;
  document.getElementById('mb').innerHTML=`<div class="mrow"><strong>المادة:</strong><span>${SUBJ[r.m]||'—'}</span></div><div class="mrow"><strong>المستوى:</strong><span>${LVL[r.l]||r.l}</span></div><div class="mrow"><strong>النوع:</strong><span>${r.n}</span></div>${r.d?`<div class="mdesc">${r.d}</div>`:''}${r.u?`<a class="mbtn" href="${r.u}" target="_blank">📎 فتح / تحميل الملف</a>`:`<p style="color:var(--gray-400);font-size:.83rem">لم يُضَف رابط بعد — سيُتاح قريباً.</p>`}`;
  document.getElementById('ov').classList.add('on');
}
function closeM(){document.getElementById('ov').classList.remove('on')}
function closeIfBg(e){if(e.target===document.getElementById('ov'))closeM()}
function setTab(v,el){curTab=v;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');render()}
function setLvl(v,el){curLvl=v;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');render()}
stats();render();
</script>
</body>
</html>
