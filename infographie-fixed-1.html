<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 الإنفوغرافيا التعليمية | مدرستي.ma</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--orange:#F4711A;--orange-dark:#D05A0E;--blue:#1A3A6B;--blue-mid:#1E4D8C;--blue-light:#2556A8;--gold:#F5A623;--green:#2A7D4F;--purple:#7B2D8B;--gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-400:#9CA3AF;--gray-600:#4B5563;--gray-800:#1F2937;--sh:0 2px 12px rgba(26,58,107,.10);--shl:0 8px 40px rgba(26,58,107,.18);--r:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh}

/* HEADER */
header{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-mid) 70%,var(--blue-light) 100%);position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(26,58,107,.35)}
.h-top{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.12)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--orange),var(--gold));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px rgba(244,113,26,.4);flex-shrink:0}
.logo-text h1{color:#fff;font-size:1.2rem;font-weight:900;line-height:1.1}
.logo-text p{color:rgba(255,255,255,.7);font-size:.68rem}
.h-tabs{display:flex;padding:0 20px;gap:2px;overflow-x:auto;scrollbar-width:none}
.h-tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 16px;background:none;border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,.6);font-family:'Cairo',sans-serif;font-size:.84rem;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap;text-decoration:none;display:inline-block}
.tab.on,.tab:hover{color:#fff}
.tab.on{border-bottom-color:var(--orange)}

/* HERO */
.hero{background:linear-gradient(135deg,var(--blue),var(--blue-mid));color:#fff;padding:28px 20px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;background:radial-gradient(circle,rgba(244,113,26,.25) 0%,transparent 70%);border-radius:50%}
.hero h2{font-size:1.5rem;font-weight:900;margin-bottom:6px;position:relative;z-index:1}
.hero p{font-size:.85rem;opacity:.8;position:relative;z-index:1}
.hero-stats{display:flex;justify-content:center;gap:20px;margin-top:14px;position:relative;z-index:1}
.hstat{text-align:center}
.hstat-n{font-size:1.4rem;font-weight:900;color:var(--gold)}
.hstat-l{font-size:.7rem;opacity:.75}

/* FILTERS */
.filters{display:flex;gap:8px;padding:14px 18px;background:#fff;border-bottom:1px solid var(--gray-200);overflow-x:auto;scrollbar-width:none;position:sticky;top:95px;z-index:100}
.filters::-webkit-scrollbar{display:none}
.chip{padding:6px 15px;border-radius:20px;border:2px solid var(--gray-200);background:#fff;font-family:'Cairo',sans-serif;font-size:.8rem;font-weight:600;color:var(--gray-600);cursor:pointer;transition:.2s;white-space:nowrap}
.chip.on{background:var(--orange);border-color:var(--orange);color:#fff;box-shadow:0 3px 10px rgba(244,113,26,.3)}

/* GRID */
.wrap{max-width:960px;margin:0 auto;padding:22px 14px 70px}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:11px;border-bottom:2px solid var(--gray-200)}
.sec-head h3{font-size:1rem;font-weight:700;color:var(--blue)}
.badge{background:var(--orange);color:#fff;font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:9px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}

/* CARD */
.card{background:#fff;border-radius:var(--r);border:1px solid var(--gray-200);box-shadow:var(--sh);overflow:hidden;cursor:pointer;transition:transform .22s,box-shadow .22s;animation:up .35s ease both}
.card:hover{transform:translateY(-4px);box-shadow:var(--shl)}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.card-img{width:100%;height:160px;object-fit:cover;display:block;background:var(--gray-100)}
.card-body{padding:12px 14px}
.card-cat{font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:6px;margin-bottom:6px;display:inline-block}
.card-title{font-size:.88rem;font-weight:700;color:var(--gray-800);line-height:1.4;margin-bottom:4px}
.card-level{font-size:.72rem;color:var(--gray-400)}
.card-actions{display:flex;gap:6px;margin-top:10px}
.btn-view{flex:1;padding:7px;background:var(--gray-100);border:none;border-radius:8px;font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:600;color:var(--blue);cursor:pointer;transition:.18s}
.btn-view:hover{background:var(--blue);color:#fff}
.btn-dl{padding:7px 10px;background:var(--orange);border:none;border-radius:8px;font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:600;color:#fff;cursor:pointer;transition:.18s;text-decoration:none;display:flex;align-items:center;gap:4px}
.btn-dl:hover{background:var(--orange-dark)}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;padding:12px}
.overlay.on{display:flex}
.modal{background:#fff;border-radius:18px;width:100%;max-width:680px;max-height:92vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:min .28s ease;display:flex;flex-direction:column}
@keyframes min{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.modal-head{padding:14px 18px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-head h3{font-size:.98rem;font-weight:700;color:var(--blue)}
.modal-x{width:30px;height:30px;border-radius:50%;border:none;background:var(--gray-200);cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:.18s;margin-right:8px}
.modal-x:hover{background:var(--orange);color:#fff}
.modal-img-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#111;min-height:200px}
.modal-img{max-width:100%;max-height:65vh;object-fit:contain;display:block}
.modal-foot{padding:12px 18px;border-top:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;flex-wrap:wrap;gap:8px}
.modal-nav{display:flex;gap:8px}
.btn-nav{padding:7px 16px;background:var(--gray-100);border:none;border-radius:8px;font-family:'Cairo',sans-serif;font-size:.82rem;font-weight:600;color:var(--blue);cursor:pointer;transition:.18s}
.btn-nav:hover{background:var(--blue);color:#fff}
.btn-nav:disabled{opacity:.4;cursor:default}
.btn-download{padding:8px 18px;background:var(--orange);color:#fff;border:none;border-radius:8px;font-family:'Cairo',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:.18s;display:flex;align-items:center;gap:6px;text-decoration:none}
.btn-download:hover{background:var(--orange-dark)}

/* CATS COLORS */
.cat-hist{background:#EBF0FF;color:var(--blue)}
.cat-geo{background:#E8F7EE;color:var(--green)}
.cat-maroc{background:#FFF3E0;color:#E65100}
.cat-meth{background:#F3E8F9;color:var(--purple)}
.cat-eu{background:#E3F2FD;color:#1565C0}
.cat-gen{background:#FFF8E1;color:#F57F17}

@media(max-width:580px){.grid{grid-template-columns:repeat(2,1fr)}.h-top{padding:10px 13px}.wrap{padding:16px 11px 60px}}
</style>
</head>
<body>

<header>
  <div class="h-top">
    <a class="logo" href="/">
      <div class="logo-icon">📚</div>
      <div class="logo-text"><h1>مدرستي.ma</h1><p>الأستاذ أحمد بوعمود | مؤسسة الحنان</p></div>
    </a>
  </div>
  <div class="h-tabs">
    <a class="tab" href="/">📋 الدروس</a>
    <a class="tab on" href="/infographie-fixed.html">🎨 الإنفوغرافيا</a>
  </div>
</header>

<div class="hero">
  <h2>🎨 الإنفوغرافيا التعليمية</h2>
  <p>ملخصات بصرية احترافية لمواد التاريخ والجغرافيا والتربية المدنية</p>
  <div class="hero-stats">
    <div class="hstat"><div class="hstat-n">20</div><div class="hstat-l">إنفوغرافية</div></div>
    <div class="hstat"><div class="hstat-n">4</div><div class="hstat-l">مواد</div></div>
    <div class="hstat"><div class="hstat-n">3</div><div class="hstat-l">مستويات</div></div>
  </div>
</div>

<div class="filters">
  <button class="chip on" onclick="filter('all',this)">🔍 الكل (20)</button>
  <button class="chip" onclick="filter('hist',this)">📜 التاريخ</button>
  <button class="chip" onclick="filter('geo',this)">🌍 الجغرافيا</button>
  <button class="chip" onclick="filter('maroc',this)">🇲🇦 تاريخ المغرب</button>
  <button class="chip" onclick="filter('meth',this)">📋 المنهجية</button>
  <button class="chip" onclick="filter('eu',this)">🇪🇺 الاتحاد الأوروبي</button>
  <button class="chip" onclick="filter('gen',this)">🧠 ثقافة عامة</button>
</div>

<div class="wrap">
  <div class="sec-head"><h3 id="sec-lbl">جميع الإنفوغرافيات</h3><span class="badge" id="sec-cnt">20</span></div>
  <div class="grid" id="grid"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="ov" onclick="closeBg(event)">
  <div class="modal">
    <div class="modal-head">
      <h3 id="mt">—</h3>
      <button class="modal-x" onclick="closeM()">✕</button>
    </div>
    <div class="modal-img-wrap">
      <img class="modal-img" id="mi" src="" alt="">
    </div>
    <div class="modal-foot">
      <div class="modal-nav">
        <button class="btn-nav" id="btnP" onclick="nav(-1)">→ السابق</button>
        <button class="btn-nav" id="btnN" onclick="nav(1)">التالي ←</button>
      </div>
      <a class="btn-download" id="btnDl" href="#" download>⬇️ تحميل</a>
    </div>
  </div>
</div>

<script>
const DATA = [
  {id:1,title:"نضال المغرب من أجل الاستقلال",cat:"maroc",level:"الأولى باكالوريا",img:"inf01.png"},
  {id:2,title:"طريقة رسم المبيان",cat:"meth",level:"خطوات عملية",img:"inf02.png"},
  {id:3,title:"دليل المنهجية الشاملة — الجغرافيا",cat:"meth",level:"الأولى باكالوريا",img:"inf03.png"},
  {id:4,title:"المغرب والسلم العالمي",cat:"maroc",level:"الثالثة إعدادي — تربية مدنية",img:"inf04.png"},
  {id:5,title:"المسابقة الثقافية الكبرى",cat:"gen",level:"غرابة + متعة + ذكاء",img:"inf05.png"},
  {id:6,title:"دروس التاريخ — الأولى باك",cat:"hist",level:"من التحولات الكبرى إلى الوحدة الترابية",img:"inf06.png"},
  {id:7,title:"التجارة مرآة للاقتصاد المغربي",cat:"geo",level:"الثانية إعدادي",img:"inf07.png"},
  {id:8,title:"سكريبت كرونولوجي — تاريخ المغرب",cat:"maroc",level:"1844 إلى 1979",img:"inf08.png"},
  {id:9,title:"التحولات الكبرى إلى نهاية ح.ع.2",cat:"hist",level:"سلسلة مترابطة من الأسباب والنتائج",img:"inf09.png"},
  {id:10,title:"الثورة الفرنسية وليدة فكر الأنوار",cat:"hist",level:"الثانية إعدادي",img:"inf10.png"},
  {id:11,title:"الاتحاد الأوروبي نحو اندماج شامل",cat:"eu",level:"الثالثة إعدادي",img:"inf11.png"},
  {id:12,title:"خريطة الصناعة بالولايات المتحدة",cat:"geo",level:"الأولى باكالوريا",img:"inf12.png"},
  {id:13,title:"خريطة الموارد البحرية بالمغرب",cat:"geo",level:"الثالثة إعدادي",img:"inf13.png"},
  {id:14,title:"الموارد البحرية بالمغرب (خريطة تفصيلية)",cat:"geo",level:"الثالثة إعدادي",img:"inf14.png"},
  {id:15,title:"الغطاء النباتي بالمغرب",cat:"geo",level:"ثروة طبيعية للتنمية المستدامة",img:"inf15.png"},
  {id:16,title:"الأحواض المائية بالمغرب",cat:"geo",level:"تدبير مستدام للموارد المائية",img:"inf16.png"},
  {id:17,title:"تكوين الاتحاد الأوروبي",cat:"eu",level:"من فكرة التعاون إلى 27 دولة",img:"inf17.png"},
  {id:18,title:"خريطة الفلاحة في الولايات المتحدة",cat:"geo",level:"أكبر قوة زراعية في العالم",img:"inf18.png"},
  {id:19,title:"خريطة التنمية البشرية في العالم",cat:"geo",level:"مؤشر HDI — الأولى باكالوريا",img:"inf19.png"},
  {id:20,title:"عناصر الإجابة — الامتحان الجهوي",cat:"meth",level:"نموذج 2012 — الأولى باكالوريا",img:"inf20.png"},
];

const CAT_LABEL={hist:"📜 التاريخ",geo:"🌍 الجغرافيا",maroc:"🇲🇦 تاريخ المغرب",meth:"📋 منهجية",eu:"🇪🇺 الاتحاد الأوروبي",gen:"🧠 ثقافة عامة"};
const CAT_CLASS={hist:"cat-hist",geo:"cat-geo",maroc:"cat-maroc",meth:"cat-meth",eu:"cat-eu",gen:"cat-gen"};

let curCat='all', curIdx=0, filtered=[];

function filter(cat, el){
  curCat=cat;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  render();
}

function render(){
  filtered = curCat==='all' ? DATA : DATA.filter(d=>d.cat===curCat);
  const lbl = curCat==='all'?'جميع الإنفوغرافيات':CAT_LABEL[curCat]||curCat;
  document.getElementById('sec-lbl').textContent=lbl;
  document.getElementById('sec-cnt').textContent=filtered.length;
  document.getElementById('grid').innerHTML=filtered.map((d,i)=>`
    <div class="card" style="animation-delay:${i*.04}s">
      <img class="card-img" src="${d.img}" alt="${d.title}" loading="lazy" onerror="this.style.background='#e5e7eb';this.style.minHeight='120px'">
      <div class="card-body">
        <span class="card-cat ${CAT_CLASS[d.cat]||''}">${CAT_LABEL[d.cat]||d.cat}</span>
        <div class="card-title">${d.title}</div>
        <div class="card-level">${d.level}</div>
        <div class="card-actions">
          <button class="btn-view" onclick="openM(${i})">🔍 عرض</button>
          <a class="btn-dl" href="${d.img}" download="${d.title}.png">⬇️</a>
        </div>
      </div>
    </div>`).join('');
}

function openM(i){
  curIdx=i;
  const d=filtered[i];
  document.getElementById('mt').textContent=d.title;
  document.getElementById('mi').src=d.img;
  document.getElementById('mi').alt=d.title;
  document.getElementById('btnDl').href=d.img;
  document.getElementById('btnDl').download=d.title+'.png';
  document.getElementById('btnP').disabled=(i===0);
  document.getElementById('btnN').disabled=(i===filtered.length-1);
  document.getElementById('ov').classList.add('on');
}

function nav(dir){
  const next=curIdx+dir;
  if(next>=0&&next<filtered.length) openM(next);
}

function closeM(){document.getElementById('ov').classList.remove('on')}
function closeBg(e){if(e.target===document.getElementById('ov'))closeM()}

document.addEventListener('keydown',e=>{
  if(!document.getElementById('ov').classList.contains('on'))return;
  if(e.key==='ArrowRight')nav(-1);
  if(e.key==='ArrowLeft')nav(1);
  if(e.key==='Escape')closeM();
});

render();
</script>
</body>
</html>
